<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VivahMatch - Find Your Perfect Partner</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    /* ══════════════════════════════════════
       DARK MODE VARIABLES
    ══════════════════════════════════════ */
    :root {
      --bg: #fef7f0; --bg2: #fff; --text: #2d2a2a; --text2: #5a5a5a;
      --border: #e0d0d0; --card: #fff; --shadow: rgba(0,0,0,0.08);
      --nav-bg: #fff; --input-bg: #fff; --footer: #2d2a2a;
    }
    [data-theme="dark"] {
      --bg: #1a1a2e; --bg2: #16213e; --text: #eee; --text2: #aaa;
      --border: #333; --card: #0f3460; --shadow: rgba(0,0,0,0.3);
      --nav-bg: #16213e; --input-bg: #0f3460; --footer: #0d0d0d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: background 0.3s, color 0.3s; }
    body { background: var(--bg); color: var(--text); }

    /* ── Header ── */
    .header { background: var(--nav-bg); box-shadow: 0 2px 12px var(--shadow); position: sticky; top: 0; z-index: 200; }
    .nav-container { max-width: 1280px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
    .logo { font-size: 26px; font-weight: 700; background: linear-gradient(135deg,#c62e6e,#e84545); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .logo i { color: #e84545; background: none; -webkit-background-clip: unset; background-clip: unset; margin-right: 6px; }
    .nav-links { display: flex; gap: 24px; font-weight: 500; }
    .nav-links a { text-decoration: none; color: var(--text2); transition: 0.2s; cursor: pointer; font-size: 0.95rem; }
    .nav-links a:hover, .nav-links a.active { color: #e84545; }
    .auth-buttons { display: flex; gap: 10px; align-items: center; }
    .btn-outline { background: transparent; border: 1px solid #e84545; color: #e84545; padding: 7px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    .btn-outline:hover { background: #e84545; color: white; }
    .btn-primary { background: #e84545; border: none; color: white; padding: 7px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    .btn-primary:hover { background: #c62e6e; }

    /* Dark mode toggle */
    .dark-toggle { background: none; border: 2px solid var(--border); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 16px; color: var(--text); display: flex; align-items: center; justify-content: center; }

    /* Notification bell */
    .notif-btn { position: relative; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text2); }
    .notif-badge { position: absolute; top: -4px; right: -4px; background: #e84545; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; }

    /* ── Pages ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Hero ── */
    .hero { background: linear-gradient(135deg,#fff5ed,#ffe6f0); padding: 48px 24px; text-align: center; }
    [data-theme="dark"] .hero { background: linear-gradient(135deg,#1a1a2e,#16213e); }
    .hero h1 { font-size: 2.6rem; font-weight: 700; color: #c62e6e; margin-bottom: 16px; }
    .hero p { font-size: 1.1rem; color: var(--text2); max-width: 700px; margin: 0 auto 32px; }
    .search-bar-large { max-width: 600px; margin: 0 auto; display: flex; background: var(--bg2); border-radius: 60px; box-shadow: 0 6px 20px var(--shadow); overflow: hidden; }
    .search-bar-large input { flex: 1; border: none; padding: 14px 24px; font-size: 1rem; outline: none; background: transparent; color: var(--text); }
    .search-bar-large button { background: #e84545; border: none; padding: 0 28px; color: white; font-weight: bold; cursor: pointer; }

    /* ── Filters ── */
    .filters-section { background: var(--bg2); border-radius: 40px; margin: 24px auto; max-width: 1280px; padding: 20px 28px; box-shadow: 0 4px 12px var(--shadow); }
    .filter-grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-between; align-items: flex-end; }
    .filter-group { flex: 1; min-width: 130px; }
    .filter-group label { display: block; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #a55a5a; margin-bottom: 5px; }
    .filter-group select { width: 100%; padding: 9px 12px; border-radius: 30px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); font-size: 0.9rem; outline: none; }
    .filter-btn { background: #e84545; color: white; border: none; padding: 9px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; }

    /* ── Container ── */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 24px 48px; }
    .section-title { font-size: 1.6rem; font-weight: 600; margin: 28px 0 18px; color: #c62e6e; border-left: 5px solid #e84545; padding-left: 14px; }

    /* ── Profile Grid ── */
    .profile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 24px; }
    .profile-card { background: var(--card); border-radius: 24px; overflow: hidden; box-shadow: 0 8px 20px var(--shadow); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; position: relative; }
    .profile-card:hover { transform: translateY(-6px); box-shadow: 0 16px 30px var(--shadow); }
    .card-img { width: 100%; height: 240px; object-fit: cover; background: #f5e6e0; }
    .card-info { padding: 16px; }
    .card-name { font-size: 1.3rem; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .card-age { font-weight: 500; color: #e84545; font-size: 1rem; }
    .card-details { margin: 7px 0; color: var(--text2); font-size: 0.88rem; display: flex; gap: 10px; flex-wrap: wrap; }
    .card-details i { width: 16px; color: #e84545; }
    .interest-btn { width: 100%; background: #ffe6e6; border: none; padding: 9px; margin-top: 10px; border-radius: 40px; font-weight: 600; color: #e84545; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    .interest-btn:hover { background: #e84545; color: white; }
    .interest-btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

    /* ── Premium Badge ── */
    .premium-badge { position: absolute; top: 12px; right: 12px; background: linear-gradient(135deg,#f7971e,#ffd200); color: #333; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 4px; }
    .premium-badge i { font-size: 10px; }

    /* ── Horoscope Badge ── */
    .horoscope-badge { display: inline-block; background: linear-gradient(135deg,#667eea,#764ba2); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; margin-top: 4px; }

    /* ── Chat Button ── */
    .chat-btn { width: 100%; background: #e3f2fd; border: none; padding: 9px; margin-top: 6px; border-radius: 40px; font-weight: 600; color: #1565c0; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    .chat-btn:hover { background: #1565c0; color: white; }

    /* ══════════════════════════════════════
       MODALS
    ══════════════════════════════════════ */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
    .modal.active { display: flex; }
    .modal-box { background: var(--bg2); max-width: 460px; width: 100%; border-radius: 28px; padding: 32px; animation: fadeInUp 0.3s; max-height: 90vh; overflow-y: auto; }
    .modal-box h2 { font-size: 1.6rem; color: #c62e6e; margin-bottom: 18px; }
    .modal-box input, .modal-box select, .modal-box textarea { width: 100%; padding: 11px 16px; border: 1px solid var(--border); border-radius: 30px; margin-bottom: 12px; font-size: 0.95rem; outline: none; background: var(--input-bg); color: var(--text); }
    .modal-box textarea { border-radius: 16px; resize: vertical; min-height: 80px; }
    .modal-box button.submit-btn { width: 100%; background: #e84545; border: none; color: white; padding: 12px; border-radius: 40px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 4px; }
    .modal-box .switch-link { text-align: center; margin-top: 14px; font-size: 0.9rem; color: var(--text2); }
    .modal-box .switch-link a { color: #e84545; cursor: pointer; font-weight: 600; }
    .modal-close-btn { float: right; background: none; border: none; font-size: 22px; cursor: pointer; color: #aaa; }
    .error-msg { color: #e84545; font-size: 0.85rem; margin-bottom: 10px; text-align: center; }

    /* Profile detail modal */
    .profile-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
    .profile-modal.active { display: flex; }
    .profile-modal-content { background: var(--bg2); max-width: 500px; width: 100%; border-radius: 32px; overflow: hidden; animation: fadeInUp 0.3s; max-height: 90vh; overflow-y: auto; }
    .modal-img { width: 100%; height: 260px; object-fit: cover; }
    .modal-body { padding: 22px; }
    .modal-title { font-size: 1.7rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }
    .modal-detail { margin: 10px 0; display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.88rem; color: var(--text2); }
    .modal-detail span { display: flex; align-items: center; gap: 5px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 40px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
    .btn-interest-modal { background: #e84545; color: white; }
    .btn-chat-modal { background: #1565c0; color: white; }

    /* ══════════════════════════════════════
       CHAT MODAL
    ══════════════════════════════════════ */
    .chat-modal { display: none; position: fixed; bottom: 20px; right: 20px; width: 340px; height: 480px; background: var(--bg2); border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); z-index: 1100; flex-direction: column; animation: fadeInUp 0.3s; }
    .chat-modal.active { display: flex; }
    .chat-header { background: linear-gradient(135deg,#c62e6e,#e84545); color: white; padding: 14px 18px; border-radius: 20px 20px 0 0; display: flex; justify-content: space-between; align-items: center; }
    .chat-header span { font-weight: 600; font-size: 1rem; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .chat-msg { max-width: 75%; padding: 9px 14px; border-radius: 18px; font-size: 0.88rem; line-height: 1.4; }
    .chat-msg.sent { background: #e84545; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .chat-msg.received { background: var(--bg); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-time { font-size: 0.7rem; opacity: 0.7; margin-top: 3px; }
    .chat-input-row { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .chat-input-row input { flex: 1; border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; font-size: 0.9rem; outline: none; background: var(--input-bg); color: var(--text); }
    .chat-send-btn { background: #e84545; border: none; color: white; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 14px; }

    /* ══════════════════════════════════════
       NOTIFICATIONS PANEL
    ══════════════════════════════════════ */
    .notif-panel { display: none; position: absolute; top: 60px; right: 20px; width: 320px; background: var(--bg2); border-radius: 16px; box-shadow: 0 10px 40px var(--shadow); z-index: 500; border: 1px solid var(--border); }
    .notif-panel.active { display: block; }
    .notif-panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-weight: 700; color: var(--text); display: flex; justify-content: space-between; }
    .notif-item { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; cursor: pointer; }
    .notif-item:hover { background: var(--bg); }
    .notif-icon { width: 36px; height: 36px; border-radius: 50%; background: #ffe6e6; display: flex; align-items: center; justify-content: center; color: #e84545; font-size: 14px; flex-shrink: 0; }
    .notif-text { font-size: 0.85rem; color: var(--text); }
    .notif-time { font-size: 0.75rem; color: var(--text2); margin-top: 3px; }
    .notif-unread { background: #fff5f5; }
    [data-theme="dark"] .notif-unread { background: #1a0a0a; }

    /* ══════════════════════════════════════
       PROFILE PHOTO UPLOAD
    ══════════════════════════════════════ */
    .photo-upload-area { border: 2px dashed var(--border); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; margin-bottom: 12px; color: var(--text2); transition: 0.2s; }
    .photo-upload-area:hover { border-color: #e84545; color: #e84545; }
    .photo-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 8px auto; display: block; }

    /* ══════════════════════════════════════
       SUCCESS STORIES PAGE
    ══════════════════════════════════════ */
    .stories-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; margin-top: 20px; }
    .story-card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 8px 20px var(--shadow); }
    .story-couple { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; }
    .story-couple img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 3px solid #e84545; }
    .story-names { font-weight: 700; font-size: 1.1rem; color: var(--text); }
    .story-married { font-size: 0.8rem; color: #e84545; }
    .story-text { font-size: 0.9rem; color: var(--text2); line-height: 1.6; font-style: italic; }
    .story-stars { color: #ffd200; margin-top: 10px; font-size: 0.85rem; }

    /* ══════════════════════════════════════
       HOROSCOPE MATCH PAGE
    ══════════════════════════════════════ */
    .horoscope-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; margin: 20px 0; }
    .rashi-card { background: var(--card); border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; box-shadow: 0 4px 12px var(--shadow); transition: 0.2s; border: 2px solid transparent; }
    .rashi-card:hover, .rashi-card.selected { border-color: #e84545; background: #fff5f5; }
    .rashi-card .rashi-symbol { font-size: 2rem; margin-bottom: 6px; }
    .rashi-card .rashi-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .compatibility-result { background: linear-gradient(135deg,#c62e6e,#e84545); color: white; border-radius: 20px; padding: 24px; text-align: center; margin-top: 20px; }
    .compatibility-score { font-size: 3rem; font-weight: 700; }
    .compatibility-label { font-size: 1.1rem; opacity: 0.9; }
    .compat-bar { background: rgba(255,255,255,0.3); border-radius: 10px; height: 10px; margin: 16px 0; }
    .compat-fill { background: white; border-radius: 10px; height: 10px; transition: width 1s ease; }

    /* ══════════════════════════════════════
       ADMIN DASHBOARD
    ══════════════════════════════════════ */
    .admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 20px; }
    .stat-card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: 0 8px 20px var(--shadow); display: flex; gap: 16px; align-items: center; }
    .stat-icon { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: white; }
    .stat-icon.red { background: linear-gradient(135deg,#e84545,#c62e6e); }
    .stat-icon.blue { background: linear-gradient(135deg,#1565c0,#42a5f5); }
    .stat-icon.green { background: linear-gradient(135deg,#2e7d32,#66bb6a); }
    .stat-icon.orange { background: linear-gradient(135deg,#e65100,#ffa726); }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 0.85rem; color: var(--text2); }
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--card); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 12px var(--shadow); }
    .admin-table th { background: #e84545; color: white; padding: 12px 16px; text-align: left; font-size: 0.9rem; }
    .admin-table td { padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 0.88rem; color: var(--text); }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--bg); }
    .badge-active { background: #e8f5e9; color: #2e7d32; padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }
    .badge-premium { background: #fff8e1; color: #f57f17; padding: 3px 10px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }

    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: #2d2a2a; color: white; padding: 12px 28px; border-radius: 40px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    footer { background: var(--footer); color: #ccc; text-align: center; padding: 24px; margin-top: 32px; }

    @media (max-width: 800px) {
      .nav-container { flex-direction: column; text-align: center; }
      .filter-grid { flex-direction: column; gap: 12px; }
      .filter-group { width: 100%; }
      .hero h1 { font-size: 1.8rem; }
      .chat-modal { width: 100%; right: 0; bottom: 0; border-radius: 20px 20px 0 0; }
      .notif-panel { width: 100%; right: 0; }
    }
  </style>
</head>
<body>

<!-- ════════════════ HEADER ════════════════ -->
<header class="header">
  <div class="nav-container">
    <div class="logo"><i class="fas fa-heart"></i> VivahMatch</div>
    <div class="nav-links">
      <a class="active" onclick="showPage('home')">Home</a>
      <a onclick="showPage('matches')">Matches</a>
      <a onclick="showPage('horoscope')">Horoscope</a>
      <a onclick="showPage('stories')">Stories</a>
      <a onclick="openEditProfile()" id="myProfileLink" style="display:none">My Profile</a>
      <a onclick="showPage('admin')" id="adminLink" style="display:none">Admin</a>
    </div>
    <div class="auth-buttons" id="authButtons">
      <button class="dark-toggle" onclick="toggleDark()" title="Toggle Dark Mode">🌙</button>
      <button class="btn-outline" id="loginBtn">Login</button>
      <button class="btn-primary" id="registerBtn">Register Free</button>
    </div>
  </div>
  <!-- Notification Panel -->
  <div class="notif-panel" id="notifPanel">
    <div class="notif-panel-header">
      <span>🔔 Notifications</span>
      <span style="font-size:0.8rem;color:#e84545;cursor:pointer" onclick="clearNotifs()">Clear all</span>
    </div>
    <div id="notifList"></div>
  </div>
</header>

<!-- ════════════════ PAGE: HOME ════════════════ -->
<div class="page active" id="page-home">
  <section class="hero">
    <h1>Find your soulmate, <br>the modern way 💕</h1>
    <p
